name: Release to Server

# Triggers when publish.mjs pushes a version tag (e.g. 2.9.8.0)
on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*.[0-9]*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout lxd-tools
        uses: actions/checkout@v4
        with:
          path: lxd-tools

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: lxd-tools
        run: npm install --legacy-peer-deps

      - name: Build
        working-directory: lxd-tools
        run: npm run build
        # Webpack outputs to ../dist = $GITHUB_WORKSPACE/dist/
        # Produces: update.xml, updates.json, lxd-extension-VERSION.xpi

      - name: Install Chrome
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Pack CRX
        run: |
          VERSION=$(node -p 'require("./lxd-tools/package.json").version')
          # Decode the private key stored as a base64 GitHub secret
          echo "${{ secrets.CHROME_KEY_PEM_B64 }}" | base64 -d > chrome-key.pem
          # Chrome creates dist.crx next to the dist/ directory
          google-chrome --pack-extension=dist --pack-extension-key=chrome-key.pem
          mv dist.crx "dist/lxd-extension-${VERSION}.crx"
          rm chrome-key.pem

      - name: Upload to server
        run: |
          VERSION=$(node -p 'require("./lxd-tools/package.json").version')
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # SERVER_HOST is the Ubuntu VM's SSH address (may differ from ai2.unity.edu)
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key" \
            "dist/lxd-extension-${VERSION}.crx" \
            "dist/lxd-extension-${VERSION}.xpi" \
            "dist/update.xml" \
            "dist/updates.json" \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_PATH }}"
