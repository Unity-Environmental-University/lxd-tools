name: Deploy Extension Updates

on:
  pull_request:
    branches:
      - main
    types: [closed]

jobs:
  deploy_if_merged:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout lxd-tools
        uses: actions/checkout@v4
        with:
          path: lxd-tools

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Authenticate GitHub CLI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Find pr-build run ID
        id: find_run
        working-directory: lxd-tools
        run: |
          PR_SHA=${{ github.event.pull_request.head.sha }}
          RUN_ID=$(gh run list \
            --workflow "lxd-tools build" \
            --json databaseId,headSha \
            --limit 5 \
            | jq --raw-output ".[] | select(.headSha==\"$PR_SHA\") | .databaseId" \
            | head -n1)

          if [ -z "$RUN_ID" ]; then
            echo "Error: Could not find build run for SHA $PR_SHA"
            exit 1
          fi

          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Download build artifact
        working-directory: lxd-tools
        run: |
          mkdir -p dist
          gh run download ${{ steps.find_run.outputs.run_id }} \
            --name lxd-tools \
            --dir dist

      - name: Checkout lxd-tools-build & update beta branch
        run: |
          git clone https://x-access-token:${{ secrets.LXD_TOOLS_BUILD_TOKEN }}@github.com/Unity-Environmental-University/lxd-tools-build.git lxd-tools-build
          cd lxd-tools-build
          git fetch origin
          if git ls-remote --exit-code --heads origin beta; then
            git checkout beta
            git reset --hard origin/beta
          else
            git checkout -b beta
            git push -u origin beta
          fi

      - name: Deploy to lxd-tools-build
        run: |
          cd lxd-tools-build
          rm -rf ./*
          cp -r ../lxd-tools/dist/* .
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Deploy beta build from PR #${{ github.event.pull_request.number }}" || echo "No changes to commit"
          git push origin beta

      - name: Tag beta with version
        run: |
          cd lxd-tools-build
          VERSION=$(jq -r .version manifest.json)
          TAG="beta-$VERSION"
          echo "Tagging as $TAG"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          else
            echo "Tag $TAG already exists, skipping"
          fi
